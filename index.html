<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangLens - Read. Capture. Review.</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
    <aside id="sidebar">
        <div class="sidebar-brand">
            <h1>🔍 LangLens</h1>
            <span class="tagline">Read. Capture. Review.</span>
        </div>
        <nav>
            <a href="#" data-view="dashboard" class="nav-link active">
                <span class="nav-icon">📊</span> Dashboard
            </a>
            <a href="#" data-view="library" class="nav-link">
                <span class="nav-icon">📚</span> Library
            </a>
            <a href="#" data-view="vocab" class="nav-link">
                <span class="nav-icon">🔤</span> Items
            </a>
            <a href="#" data-view="notes" class="nav-link">
                <span class="nav-icon">📌</span> Notes
            </a>
            <a href="#" data-view="review" class="nav-link">
                <span class="nav-icon">🧠</span> Review
                <span id="review-badge" class="badge hidden">0</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button id="btn-theme" class="theme-toggle" title="Toggle light/dark theme">🌙 Dark</button>
            <div class="sidebar-footer-actions">
                <button id="btn-export" class="btn-subtle" title="Create a backup">⬇ Backup</button>
                <button id="btn-import" class="btn-subtle" title="Restore from a backup">⬆ Restore</button>
            </div>
            <button id="btn-clear-data" class="btn-subtle btn-subtle-full btn-subtle-danger" title="Clear current library data">🗑 Clear Data</button>
            <div id="backup-footer-status" class="backup-footer-status">Persistent storage unavailable<br>No backup saved yet</div>
            <input type="file" id="import-file" accept=".json" hidden>
        </div>
    </aside>

    <main id="main">
        <div id="view-dashboard" class="view"></div>
        <div id="view-library" class="view hidden"></div>
        <div id="view-reader" class="view hidden"></div>
        <div id="view-vocab" class="view hidden"></div>
        <div id="view-notes" class="view hidden"></div>
        <div id="view-review" class="view hidden"></div>
    </main>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal-content" class="modal-content"></div>
    </div>

    <!-- Floating Selection Toolbar -->
    <div id="selection-toolbar" class="selection-toolbar hidden">
        <button id="selection-save-item" class="st-btn st-save">📝 Save Item</button>
        <button id="selection-add-note" class="st-btn st-note">📌 Add Note</button>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <script src="js/backup-utils.js"></script>
    <script src="js/db.js"></script>
    <script src="js/item-import-utils.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
